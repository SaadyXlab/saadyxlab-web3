<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mint War Room</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,sans-serif;
  background:#050505;
  color:#fff;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid #111;
}
.logo{color:#ff4d4d;font-weight:bold}

/* HERO */
.hero{
  text-align:center;
  padding:30px 20px;
}

h1{
  font-size:2.2rem;
  color:#ff4d4d;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
  max-width:500px;
  margin:20px auto;
}

/* BOX */
.box{
  background:#0f0f0f;
  padding:20px;
  border-radius:15px;
  border:1px solid #222;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
}

.mint{background:#ff4d4d;color:#fff}
.snipe{background:#00ffd5;color:#000}
.share{background:#1da1f2;color:#fff}

/* FEED */
.feed{
  max-height:150px;
  overflow:auto;
  font-size:0.85rem;
}

.entry{
  margin:4px 0;
  opacity:0.8;
}

/* STATUS */
.status{
  margin-top:10px;
  font-size:0.9rem;
  color:#00ffd5;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  opacity:0.4;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">MINT WAR ROOM</div>
  <div id="wallet">Not connected</div>
</div>

<div class="hero">
  <h1>LIVE MINT FEED</h1>
  <p>Track mint activity in real-time</p>
</div>

<div class="grid">

  <div class="box">
    <p id="countdown">Loading...</p>
    <p id="supply">Minted: 1200 / 2222</p>
    <p id="gas">Gas: 22 gwei</p>

    <button class="mint" onclick="mint()">Mint</button>
    <button class="snipe" onclick="snipe()">Activate Snipe Mode</button>
    <button class="share" onclick="share()">Share</button>

    <div class="status" id="status"></div>
  </div>

  <div class="box">
    <h3>Recent Mints</h3>
    <div class="feed" id="feed"></div>
  </div>

</div>

<div class="footer">
Built by @SaadyXLab • Web3 Dev Journey
</div>

<script>
let user="";
let minted=1200;

// CONNECT WALLET
async function connect(){
  if(!window.ethereum) return alert("Install MetaMask");
  const acc=await window.ethereum.request({method:"eth_requestAccounts"});
  user=acc[0];
  document.getElementById("wallet").innerText =
    user.slice(0,6)+"..."+user.slice(-4);
}
connect();

// COUNTDOWN
const end = new Date().getTime() + 3600000;
setInterval(()=>{
  const now = new Date().getTime();
  const diff = end - now;
  const min = Math.floor(diff/60000);
  document.getElementById("countdown").innerText =
    "Mint ends in " + min + " mins";
},1000);

// SUPPLY UPDATE
setInterval(()=>{
  minted += Math.floor(Math.random()*3);
  document.getElementById("supply").innerText =
    "Minted: " + minted + " / 2222";
},2000);

// GAS SIM
setInterval(()=>{
  const gas = Math.floor(Math.random()*40)+20;
  document.getElementById("gas").innerText =
    "Gas: " + gas + " gwei";
},3000);

// FEED
setInterval(()=>{
  const wallets=["0xA1...2F","0x9B...7C","0x33...AA","0x77...DD"];
  const rand=wallets[Math.floor(Math.random()*wallets.length)];

  const div=document.createElement("div");
  div.className="entry";
  div.innerText=rand+" minted 1";

  document.getElementById("feed").prepend(div);
},2000);

// MINT
function mint(){
  document.getElementById("status").innerText="Mint sent 🚀";
}

// SNIPE MODE
function snipe(){
  document.getElementById("status").innerText="Snipe mode active ⚡";
}

// SHARE
function share(){
  const text=encodeURIComponent(
    "Watching a live mint 👀 FOMO is real"
  );
  window.open("https://twitter.com/intent/tweet?text="+text,"_blank");
}
</script>

</body>
</html>
